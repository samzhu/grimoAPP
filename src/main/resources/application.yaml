server:
  address: 127.0.0.1              # architecture §9: localhost-only

spring:
  application:
    name: grimo
  threads:
    virtual:
      enabled: true            # P7 / architecture §4
  datasource:
    url: jdbc:h2:file:${user.home}/.grimo/db/grimo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always             # Always run schema.sql (H2 uses IF NOT EXISTS)
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true        # Auto-create EVENT_PUBLICATION table (modulith-events-jdbc)
